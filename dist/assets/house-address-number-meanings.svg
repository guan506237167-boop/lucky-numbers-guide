<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" role="img" aria-labelledby="title desc">
  <title id="title">Address number meaning cards</title>
  <desc id="desc">Four number cards showing 6, 8, 9, and 4 as address review cues.</desc>
  <rect width="1200" height="900" rx="44" fill="#fff7e8"/>
  <g opacity=".28" stroke="#d0a342" stroke-width="2">
    <path d="M100 120 H1100 M100 300 H1100 M100 480 H1100 M100 660 H1100"/>
    <path d="M180 70 V790 M380 70 V790 M580 70 V790 M780 70 V790 M980 70 V790"/>
  </g>
  <g transform="translate(135 155)">
    <rect width="205" height="250" rx="28" fill="#24382f"/>
    <text x="102" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="100" fill="#f3ce83" font-weight="700">6</text>
    <circle cx="102" cy="194" r="23" fill="#f3ce83" opacity=".75"/>
  </g>
  <g transform="translate(377 155)">
    <rect width="205" height="250" rx="28" fill="#8a2424"/>
    <text x="102" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="100" fill="#fff3df" font-weight="700">8</text>
    <circle cx="102" cy="194" r="23" fill="#f3ce83" opacity=".75"/>
  </g>
  <g transform="translate(619 155)">
    <rect width="205" height="250" rx="28" fill="#7e9187"/>
    <text x="102" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="100" fill="#fff3df" font-weight="700">9</text>
    <circle cx="102" cy="194" r="23" fill="#f3ce83" opacity=".75"/>
  </g>
  <g transform="translate(861 155)">
    <rect width="205" height="250" rx="28" fill="#efe2cc" stroke="#d9b66f" stroke-width="4"/>
    <text x="102" y="138" text-anchor="middle" font-family="Georgia, serif" font-size="100" fill="#8a2424" font-weight="700">4</text>
    <circle cx="102" cy="194" r="23" fill="#8a2424" opacity=".35"/>
  </g>
  <rect x="210" y="540" width="780" height="120" rx="30" fill="#fffaf1" stroke="#d9b66f" stroke-width="4"/>
  <circle cx="285" cy="600" r="34" fill="#d9b66f"/>
  <path d="M350 600 H900" stroke="#ccb99e" stroke-width="18" stroke-linecap="round"/>
</svg>
